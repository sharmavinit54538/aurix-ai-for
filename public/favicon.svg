<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="42" stroke="url(#grad1)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5" />
  
  <!-- Symmetrical Futuristic Geometric Core -->
  <!-- Left loop -->
  <path d="M30 50 C30 38.95 38.95 30 50 30 C55 30 65 38 70 50 C75 62 65 70 50 70 C38.95 70 30 61.05 30 50 Z" stroke="url(#grad1)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Right loop -->
  <path d="M70 50 C70 38.95 61.05 30 50 30 C45 30 35 38 30 50 C25 62 35 70 50 70 C61.05 70 70 61.05 70 50 Z" stroke="url(#grad2)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Central Node -->
  <circle cx="50" cy="50" r="7" fill="#FFFFFF" filter="url(#glow)" />
</svg>
